<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Secure Portal</title>
    <style>
      body { font-family: system-ui, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
      .container { background: #1e293b; padding: 2rem 3rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); width: 100%; max-width: 400px; }
      h2 { text-align: center; margin-bottom: 2rem; color: #38bdf8; }
      input { width: 100%; padding: 0.8rem; margin-bottom: 1.5rem; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box; }
      button { width: 100%; padding: 0.8rem; background: #38bdf8; color: #0f172a; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
      button:hover { background: #0284c7; color: white; }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Secure Portal Access</h2>
      <form id="loginForm">
        <label>Username or Email</label>
        <input type="text" id="username" placeholder="Enter your email" />
        
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
        
        <button type="submit" id="submitBtn">Authenticate</button>
      </form>
      <p id="status" style="text-align: center; margin-top: 1rem; font-size: 0.9em; color: #94a3b8;"></p>
    </div>
    
    <!-- Injection of our passive behavioral tracker -->
    <script type="module" src="/tracker.js"></script>
    
    <script>
      document.getElementById("loginForm").addEventListener("submit", (e) => {
        e.preventDefault();
        document.getElementById("status").innerText = "Authorizing...";
        setTimeout(() => document.getElementById("status").innerText = "Invalid credentials.", 1500);
      });
    </script>
  </body>
</html>
